<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #6a5acd, #836fff);
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-group label {
            width: 150px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            flex: 1;
            padding: 6px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #6a5acd;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎓 Student Registration</h2>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel">
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div>
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female
                <input type="radio" name="g"> Other
            </div>
        </div>

        <div class="form-group">
            <label>Course</label>
            <select>
                <option>Select</option>
                <option>BCA</option>
                <option>BTech</option>
            </select>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Skills</label>
            <div>
                <input type="checkbox"> Java
                <input type="checkbox"> Python
            </div>
        </div>

        <div class="form-group">
            <label>Upload</label>
            <input type="file">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea></textarea>
        </div>

        <button class="btn">Register</button>

    </form>
</div>

</body>
</html>
