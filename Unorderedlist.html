<!DOCTYPE html>
<html>
<head>
    <title>All Unordered List Types</title>
</head>
<body>

<h2>1. Default Unordered List (disc)</h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>

<h2>2. Circle Unordered List</h2>
<ul type="circle">
    <li>Red</li>
    <li>Green</li>
    <li>Blue</li>
</ul>

<h2>3. Square Unordered List</h2>
<ul type="square">
    <li>Pen</li>
    <li>Pencil</li>
    <li>Book</li>
</ul>

<h2>4. None (No Bullet)</h2>
<ul type="none">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ul>

</body>
</html>
